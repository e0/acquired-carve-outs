    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Source Serif 4", Georgia, serif;
        background-color: #f5eeea;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ── */
      .site-header {
        padding: 1.75rem 2rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #d9cec8;
      }

      .site-logo {
        display: block;
        cursor: pointer;
      }

      .site-logo svg {
        height: 18px;
        width: auto;
        display: block;
      }

      .site-logo svg path {
        fill: #0c3b3a;
        transition: fill 0.15s;
      }

      .site-logo:hover svg path {
        fill: #48b898;
      }

      .site-heading {
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 1.5rem;
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.01em;
        color: #1a1a1a;
      }

      .site-header-btn {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
        color: #1a1a1a;
        padding: 0.45rem 0.9rem;
        border: 1px solid #1a1a1a;
        border-radius: 3px;
        transition:
          background-color 0.15s,
          color 0.15s;
      }

      .site-header-btn:hover {
        background-color: #1a1a1a;
        color: #f5eeea;
      }

      /* ── Card grid ── */
      #json-list-container {
        padding: 2rem 2rem 4rem;
        display: grid;
        gap: 1.5rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 768px) {
        #json-list-container {
          grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        }
      }

      /* ── Cards ── */
      .card {
        background: #fff;
        border: 1px solid #e2d9d3;
        border-radius: 8px;
        padding: 1.5rem;
      }

      @media (min-width: 768px) {
        .card {
          height: 20rem;
          display: flex;
          flex-direction: column;
        }

        .card-content {
          flex: 1;
          overflow-y: auto;
          min-height: 0;
        }

        .card .episode-meta {
          flex-shrink: 0;
        }
      }

      .card h4 {
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 1.25rem;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 1rem;
      }

      .card h4 a {
        text-decoration: none;
      }

      .card h4 a:hover {
        text-decoration: underline;
      }

      .card .carveouts-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9a8e88;
        margin-bottom: 0.5rem;
      }

      .card ul {
        list-style: disc;
        padding-left: 1.2rem;
        margin-bottom: 1rem;
      }

      .card li {
        font-size: 0.95rem;
        line-height: 1.55;
        margin-bottom: 0.2rem;
      }

      .card a {
        color: #1a1a1a;
        text-decoration: underline;
        text-decoration-color: #c9bfb8;
        text-underline-offset: 2px;
        transition: text-decoration-color 0.15s;
      }

      .card a:hover {
        text-decoration-color: #1a1a1a;
      }

      .card .episode-meta {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #9a8e88;
        padding-top: 1rem;
        border-top: 1px solid #ede6e1;
      }

      .card .episode-meta a {
        color: #9a8e88;
      }

      .card .episode-meta a:hover {
        color: #1a1a1a;
      }

      /* ── Mobile ── */
      @media (max-width: 600px) {
        .site-header {
          padding: 1.25rem 1.25rem 1rem;
        }

        .site-heading {
          font-size: 1.1rem;
        }

        #json-list-container {
          padding: 1.5rem 1.25rem 3rem;
        }
      }
    </style>
